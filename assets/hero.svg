<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Notify MCP saves agent tokens during long waits</title>
  <desc id="desc">An AI agent starts a long job, returns control, and receives a Telegram completion signal instead of polling for an hour.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#042F2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="218" y1="120" x2="1018" y2="523" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.25 0 0 0 0 0.95 0 0 0 0 0.85 0 0 0 0.65 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <style>
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace}
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    </style>
  </defs>
  <rect width="1200" height="630" rx="38" fill="url(#bg)"/>
  <circle cx="998" cy="88" r="190" fill="#10B981" opacity="0.13"/>
  <circle cx="156" cy="568" r="220" fill="#6366F1" opacity="0.16"/>
  <path d="M129 443C247 241 361 405 501 285C653 155 733 277 872 188C968 127 1031 130 1083 153" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>

  <g transform="translate(86 92)">
    <rect width="475" height="324" rx="24" fill="#020617" stroke="#334155" stroke-width="2"/>
    <rect x="0" y="0" width="475" height="54" rx="24" fill="#111827"/>
    <circle cx="31" cy="27" r="7" fill="#F87171"/>
    <circle cx="56" cy="27" r="7" fill="#FBBF24"/>
    <circle cx="81" cy="27" r="7" fill="#34D399"/>
    <text x="28" y="91" fill="#94A3B8" class="mono" font-size="22">$ codex: run the migration</text>
    <text x="28" y="132" fill="#E2E8F0" class="mono" font-size="25">notify.run_and_notify(...)</text>
    <text x="28" y="178" fill="#67E8F9" class="mono" font-size="22">wait_seconds: 180</text>
    <text x="28" y="218" fill="#A7F3D0" class="mono" font-size="22">hard_timeout: 30m</text>
    <text x="28" y="264" fill="#CBD5E1" class="mono" font-size="20">returns: job_id + pid + log_file</text>
    <text x="28" y="300" fill="#22C55E" class="mono" font-size="20">agent goes idle, no polling loop</text>
  </g>

  <g transform="translate(655 107)">
    <rect width="418" height="286" rx="28" fill="#ECFEFF" opacity="0.97"/>
    <rect x="31" y="31" width="356" height="224" rx="24" fill="#0F172A"/>
    <path d="M89 88h239M89 135h194M89 182h148" stroke="#67E8F9" stroke-width="14" stroke-linecap="round"/>
    <circle cx="339" cy="200" r="44" fill="#10B981"/>
    <path d="M319 201l15 15 29-36" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="58" y="278" fill="#0F172A" class="sans" font-size="24" font-weight="700">Telegram when done</text>
  </g>

  <text x="86" y="493" fill="white" class="sans" font-size="58" font-weight="800">Long waits, near-zero token burn</text>
  <text x="90" y="546" fill="#CBD5E1" class="sans" font-size="30">Let Codex start hour-long jobs, stop waiting, and wake up only when it matters.</text>
  <g transform="translate(88 573)">
    <rect width="278" height="42" rx="21" fill="#10B981" opacity="0.18" stroke="#34D399"/>
    <text x="22" y="28" fill="#A7F3D0" class="sans" font-size="20" font-weight="700">can save 90%+ waiting cost</text>
  </g>
  <g transform="translate(385 573)">
    <rect width="222" height="42" rx="21" fill="#6366F1" opacity="0.18" stroke="#818CF8"/>
    <text x="22" y="28" fill="#C4B5FD" class="sans" font-size="20" font-weight="700">self-describing MCP</text>
  </g>
  <g transform="translate(626 573)">
    <rect width="215" height="42" rx="21" fill="#0891B2" opacity="0.18" stroke="#22D3EE"/>
    <text x="22" y="28" fill="#A5F3FC" class="sans" font-size="20" font-weight="700">Codex / OpenCode / VS Code</text>
  </g>
</svg>
